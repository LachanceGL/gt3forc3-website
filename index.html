<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Race Results</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a1a;
      color: #eee;
      padding: 20px;
      max-width: 900px;
      margin: 0 auto;
    }
    h1 { margin-bottom: 4px; }
    .subtitle { color: #999; margin-bottom: 24px; font-size: 14px; }

    .discord-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #5865F2;
      color: #fff;
      text-decoration: none;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 24px;
    }
    .discord-link svg {
      width: 18px;
      height: 18px;
      fill: #fff;
    }
    .discord-link:hover { background: #4752c4; }

    .leaderboard-frame {
      width: 100%;
      height: 800px;
      border: none;
      border-radius: 8px;
      background: #111;
      margin-bottom: 32px;
    }

    h2.section-title {
      font-size: 20px;
      margin-top: 0;
      margin-bottom: 4px;
      padding-top: 16px;
      border-top: 1px solid #333;
    }
    .section-subtitle {
      color: #999;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .country-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
    }
    .country-card {
      background: #2a2a2a;
      border-radius: 8px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .country-flag {
      width: 30px;
      height: 20px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .country-info {
      display: flex;
      flex-direction: column;
    }
    .country-code {
      font-weight: 600;
      font-size: 14px;
    }
    .country-count {
      color: #999;
      font-size: 12px;
    }

    #status {
      color: #999;
      padding: 20px 0;
    }
    .error {
      color: #ff8080;
    }

    footer {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      color: #999;
      font-size: 13px;
    }
    footer a {
      color: #999;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    footer a svg {
      width: 16px;
      height: 16px;
      fill: #999;
    }
    footer a:hover svg {
      fill: #fff;
    }
    footer a:hover {
      color: #fff;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>GT3FORC3.COM</h1>
  <div class="subtitle" id="page-subtitle">Race Results</div>

  <div>
    <a class="discord-link" href="https://discord.gg/edVd7RMfpH" target="_blank" rel="noopener">

  <iframe
    class="leaderboard-frame"

    loading="lazy">
  </iframe>

  <h2 class="section-title">Where Our Drivers Race From</h2>
  <div class="section-subtitle">Countries represented across recent sessions</div>
  <div id="status"></div>
  <div id="content"></div>

  <footer>
    <span id="copyright">© GT3forc3.com</span>
    <a href="https://discord.gg/edVd7RMfpH" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M20.317 4.37a19.79 19.79 0 0 0-4.885-1.515.07.07 0 0 0-.074.035c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.036A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.056 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.927 1.793 8.18 1.793 12.061 0a.073.073 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.3 12.3 0 0 1-1.873.892.076.076 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.84 19.84 0 0 0 6.002-3.03.077.077 0 0 0 .032-.055c.5-5.177-.838-9.674-3.548-13.66a.06.06 0 0 0-.031-.028zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.955 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
      </svg>
      Join our Discord
    </a>

  <script>
    const WORKER_URL = "https://raspy-salad-d894.contact-eb9.workers.dev";
    const SESSIONS_TO_SCAN = 30; // how many recent sessions to pull driver data from

    const statusEl = document.getElementById("status");
    const contentEl = document.getElementById("content");

    // Maps ISO 3166-1 alpha-3 codes (as used in this data) to alpha-2,
    // which is what HLTV's flag images use. Covers the full standard list.
    const NATION_TO_ISO2 = {
      AFG:"AF", ALB:"AL", DZA:"DZ", ASM:"AS", AND:"AD", AGO:"AO", AIA:"AI",
      ATA:"AQ", ATG:"AG", ARG:"AR", ARM:"AM", ABW:"AW", AUS:"AU", AUT:"AT",
      AZE:"AZ", BHS:"BS", BHR:"BH", BGD:"BD", BRB:"BB", BLR:"BY", BEL:"BE",
      BLZ:"BZ", BEN:"BJ", BMU:"BM", BTN:"BT", BOL:"BO", BIH:"BA", BWA:"BW",
      BRA:"BR", BRN:"BN", BGR:"BG", BFA:"BF", BDI:"BI", KHM:"KH", CMR:"CM",
      CAN:"CA", CPV:"CV", CYM:"KY", CAF:"CF", TCD:"TD", CHL:"CL", CHN:"CN",
      COL:"CO", COM:"KM", COG:"CG", COD:"CD", COK:"CK", CRI:"CR", CIV:"CI",
      HRV:"HR", CUB:"CU", CUW:"CW", CYP:"CY", CZE:"CZ", DNK:"DK", DJI:"DJ",
      DMA:"DM", DOM:"DO", ECU:"EC", EGY:"EG", SLV:"SV", GNQ:"GQ", ERI:"ER",
      EST:"EE", SWZ:"SZ", ETH:"ET", FJI:"FJ", FIN:"FI", FRA:"FR", GAB:"GA",
      GMB:"GM", GEO:"GE", DEU:"DE", GHA:"GH", GRC:"GR", GRL:"GL", GRD:"GD",
      GTM:"GT", GIN:"GN", GNB:"GW", GUY:"GY", HTI:"HT", HND:"HN", HKG:"HK",
      HUN:"HU", ISL:"IS", IND:"IN", IDN:"ID", IRN:"IR", IRQ:"IQ", IRL:"IE",
      ISR:"IL", ITA:"IT", JAM:"JM", JPN:"JP", JOR:"JO", KAZ:"KZ", KEN:"KE",
      KIR:"KI", KWT:"KW", KGZ:"KG", LAO:"LA", LVA:"LV", LBN:"LB", LSO:"LS",
      LBR:"LR", LBY:"LY", LIE:"LI", LTU:"LT", LUX:"LU", MAC:"MO", MDG:"MG",
      MWI:"MW", MYS:"MY", MDV:"MV", MLI:"ML", MLT:"MT", MHL:"MH", MRT:"MR",
      MUS:"MU", MEX:"MX", FSM:"FM", MDA:"MD", MCO:"MC", MNG:"MN", MNE:"ME",
      MAR:"MA", MOZ:"MZ", MMR:"MM", NAM:"NA", NRU:"NR", NPL:"NP", NLD:"NL",
      NZL:"NZ", NIC:"NI", NER:"NE", NGA:"NG", PRK:"KP", MKD:"MK", NOR:"NO",
      OMN:"OM", PAK:"PK", PLW:"PW", PSE:"PS", PAN:"PA", PNG:"PG", PRY:"PY",
      PER:"PE", PHL:"PH", POL:"PL", PRT:"PT", PRI:"PR", QAT:"QA", ROM:"RO",
      ROU:"RO", RUS:"RU", RWA:"RW", KNA:"KN", LCA:"LC", VCT:"VC", WSM:"WS",
      SMR:"SM", STP:"ST", SAU:"SA", SEN:"SN", SRB:"RS", SYC:"SC", SLE:"SL",
      SGP:"SG", SVK:"SK", SVN:"SI", SLB:"SB", SOM:"SO", ZAF:"ZA", KOR:"KR",
      SSD:"SS", ESP:"ES", LKA:"LK", SDN:"SD", SUR:"SR", SWE:"SE", CHE:"CH",
      SUI:"CH", SYR:"SY", TWN:"TW", TPE:"TW", TJK:"TJ", TZA:"TZ", THA:"TH",
      TLS:"TL", TGO:"TG", TON:"TO", TTO:"TT", TUN:"TN", TUR:"TR", TKM:"TM",
      TUV:"TV", UGA:"UG", UKR:"UA", ARE:"AE", UAE:"AE", GBR:"GB", USA:"US",
      URY:"UY", UZB:"UZ", VUT:"VU", VEN:"VE", VNM:"VN", VIE:"VN", YEM:"YE",
      ZMB:"ZM", ZWE:"ZW"
    };

    function flagImgFor(code) {
      const iso2 = NATION_TO_ISO2[code];
      if (!iso2) return null;
      return `https://www.hltv.org/img/static/flags/30x20/${iso2}.gif`;
    }

    async function loadCountries() {
      statusEl.textContent = "Loading driver data...";
      statusEl.className = "";
      contentEl.innerHTML = "";

      try {
        const listRes = await fetch(WORKER_URL + "/api/v1/results");
        if (!listRes.ok) throw new Error("Server returned " + listRes.status);
        const listData = await listRes.json();

        const sessions = (listData.results || [])
          .slice()
          .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))
          .slice(0, SESSIONS_TO_SCAN);

        if (sessions.length === 0) {
          statusEl.textContent = "No session data found.";
          return;
        }

        const detailResults = await Promise.allSettled(
          sessions.map(s => fetch(WORKER_URL + s.download_url).then(r => r.json()))
        );

        // Dedupe drivers by player_id, tally by nation
        const seenPlayers = new Set();
        const nationCounts = {};

        detailResults.forEach(result => {
          if (result.status !== "fulfilled") return;
          const drivers = result.value.drivers || [];
          drivers.forEach(driver => {
            const key = driver.player_id || `${driver.first_name}-${driver.last_name}`;
            if (seenPlayers.has(key)) return;
            seenPlayers.add(key);

            const nation = driver.nation || "Unknown";
            nationCounts[nation] = (nationCounts[nation] || 0) + 1;
          });
        });

        const nations = Object.entries(nationCounts).sort((a, b) => b[1] - a[1]);

        if (nations.length === 0) {
          statusEl.textContent = "No driver nation data found.";
          return;
        }

        statusEl.textContent = "";

        const grid = document.createElement("div");
        grid.className = "country-grid";

        nations.forEach(([code, count]) => {
          const card = document.createElement("div");
          card.className = "country-card";
          const flagUrl = flagImgFor(code);
          const flagHtml = flagUrl
            ? `<img class="country-flag" src="${flagUrl}" alt="${code}" onerror="this.style.display='none'">`
            : `<div class="country-flag" style="display:flex;align-items:center;justify-content:center;background:#333;font-size:10px;">${code}</div>`;
          card.innerHTML = `
            ${flagHtml}
            <div class="country-info">
              <div class="country-code">${code}</div>
              <div class="country-count">${count} driver${count === 1 ? "" : "s"}</div>
            </div>
          `;
          grid.appendChild(card);
        });

        contentEl.appendChild(grid);
      } catch (err) {
        statusEl.textContent = "Error loading driver data: " + err.message;
        statusEl.className = "error";
      }
    }

    async function loadCurrentTrack() {
      const subtitleEl = document.getElementById("page-subtitle");
      try {
        const listRes = await fetch(WORKER_URL + "/api/v1/results");
        if (!listRes.ok) throw new Error("Server returned " + listRes.status);
        const listData = await listRes.json();

        const sessions = (listData.results || []).slice().sort(
          (a, b) => new Date(b.timestamp) - new Date(a.timestamp)
        );
        if (sessions.length === 0) return;

        const latestRes = await fetch(WORKER_URL + sessions[0].download_url);
        if (!latestRes.ok) throw new Error("Server returned " + latestRes.status);
        const latest = await latestRes.json();

        const trackParts = [latest.track_name, latest.track_layout_name].filter(Boolean);
        if (trackParts.length > 0) {
          subtitleEl.textContent = `Race Results - ${trackParts.join(" – ")}`;
        }
      } catch (err) {
        // Leave the default "Race Results" text if this fails silently
      }
    }

    loadCountries();
    loadCurrentTrack();

    document.getElementById("copyright").textContent =
      `© ${new Date().getFullYear()} GT3forc3.com`;
  </script>
</body>
</html>
