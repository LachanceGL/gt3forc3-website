<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GT3FORC3.COM / Sim Racing Community</title>
  <style>
    :root {
      /* Unified surface scale — used across the site instead of the
         previous mix of ~8 slightly different greys, so every panel,
         card, tab, input, and table header shares a consistent tone. */
      --surface-1: #141414; /* deepest: frames, section boxes, badges */
      --surface-2: #1e1e1e; /* base: tabs, table headers, inputs, cards */
      --surface-3: #262626; /* hover state, one step lighter than base */
      --surface-dim: #171717; /* extra-dim header cells (rank/session) */
      --border-subtle: #333;
    }
    html {
      background: linear-gradient(180deg, #000000 0%, #1a1a1a 600px, #1a1a1a 100%);
      background-attachment: fixed;
      border-top: 1px solid #e63946;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: transparent;
      color: #eee;
      padding: 32px 20px 20px;
      max-width: 900px;
      margin: 0 auto;
    }
    h1 { margin-top: 0; margin-bottom: 0; color: #e52421; }
    .title-link {
      color: inherit;
      text-decoration: none;
    }
    .title-link:hover {
      opacity: 0.85;
    }
    .subtitle { color: #999; margin-top: -8px; margin-bottom: 24px; font-size: 10px; font-weight: 400; font-style: italic; }

    .header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 24px;
    }
    .header-row h1,
    .header-row .subtitle {
      margin-bottom: 0;
    }

    .discord-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #5865F2;
      color: #fff;
      text-decoration: none;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
    }
    .discord-link svg {
      width: 18px;
      height: 18px;
      fill: #fff;
    }
    .discord-link:hover { background: #4752c4; }

    .discord-header-block {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
    }
    .discord-stats {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 10px;
      color: #666;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .discord-stat-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4ade80;
      display: inline-block;
      margin-right: 4px;
    }

    .leaderboard-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }
    .leaderboard-title {
      margin: 0;
      color: #999;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding-bottom: 6px;
      border-bottom: 2px solid #333;
      display: inline-flex;
      align-items: flex-end;
      gap: 8px;
    }
    .leaderboard-track-badge {
      background: var(--surface-1);
      color: #3a3a3a;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      padding: 2px 6px;
      border-radius: 3px;
    }
    .cheater-notice {
      display: none;
      align-items: center;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: #ff9900;
      background: rgba(255, 153, 0, 0.12);
      padding: 6px 10px;
      border-radius: 6px;
      white-space: nowrap;
    }
    .cheater-notice.visible {
      display: inline-flex;
    }
    .leaderboard-search-input {
      display: block;
      width: 100%;
      max-width: 220px;
      margin-left: auto;
      background: var(--surface-2);
      border: none;
      color: #eee;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
    }
    .leaderboard-search-input:focus {
      border-color: #e63946;
    }
    .leaderboard-search-input::placeholder {
      color: #555;
    }

    .leaderboard-server-name {
      color: #666;
      font-size: 13px;
      margin-bottom: 22px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .live-badge {
      display: none;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: #4ade80;
    }
    .live-player-count {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: #4ade80;
    }
    .live-badge.visible {
      display: inline-flex;
    }
    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4ade80;
      animation: live-pulse 1.6s ease-in-out infinite;
    }
    @keyframes live-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .live-badge.offline {
      color: #ff6b6b;
    }
    .live-badge.offline .live-dot {
      background: #ff6b6b;
      animation: none;
    }
    .live-badge.deactivated {
      color: #4a9eff;
    }
    .live-badge.deactivated .live-dot {
      background: #4a9eff;
      animation: none;
    }

    .leaderboard-frame {
      width: 100%;
      max-height: 578px;
      overflow-y: auto;
      border-radius: 8px;
      background: var(--surface-1);
      margin-bottom: 16px;
      scrollbar-width: thin;
      scrollbar-color: #444 #111;
    }
    .leaderboard-frame::-webkit-scrollbar {
      width: 8px;
    }
    .leaderboard-frame::-webkit-scrollbar-track {
      background: var(--surface-1);
      border-radius: 8px;
    }
    .leaderboard-frame::-webkit-scrollbar-thumb {
      background-color: #444;
      border-radius: 8px;
    }
    .leaderboard-frame::-webkit-scrollbar-thumb:hover {
      background-color: #e63946;
    }
    .leaderboard-frame table { width: 100%; }
    .leaderboard-frame thead {
      position: sticky;
      top: 0;
      z-index: 1;
      background: var(--surface-2);
    }
    .leaderboard-frame thead th {
      position: sticky;
      top: 0;
      background: var(--surface-2);
    }
    .leaderboard-frame thead th.lb-pos {
      background: var(--surface-dim);
      color: #888;
    }
    .leaderboard-frame thead th.lb-session {
      background: var(--surface-dim);
    }
    .leaderboard-frame thead th:nth-child(2),
    .leaderboard-frame thead th:nth-child(3) {
      color: #888;
    }
    .lb-pos {
      width: 50px;
      text-align: center;
      color: rgba(238, 238, 238, 0.6);
      font-weight: 700;
      white-space: nowrap;
    }
    .lb-medal {
      margin-right: 4px;
    }
    .lb-driver-name {
      font-weight: 700;
    }
    .lb-driver-flag {
      width: 16px;
      height: 11px;
      border-radius: 2px;
      margin-right: 6px;
      vertical-align: middle;
      position: relative;
      top: -1px;
    }
    .lb-driver-flag-unknown {
      display: inline-block;
      width: 16px;
      height: 11px;
      line-height: 11px;
      font-size: 10px;
      text-align: center;
      opacity: 0.5;
    }
    .lb-nickname {
      opacity: 0.5;
      font-size: 12px;
    }
    .lb-verified-badge {
      width: 14px;
      height: 14px;
      margin-left: 5px;
      vertical-align: middle;
      position: relative;
      top: -1px;
    }
    .lb-best {
      font-family: "SF Mono", Consolas, monospace;
      font-weight: 700;
      color: #e63946;
      text-align: right;
    }
    .lb-total-time {
      font-family: "SF Mono", Consolas, monospace;
      font-weight: 700;
      color: #eee;
      text-align: right;
    }
    .lb-total-time-invalid {
      color: #666;
      font-weight: 600;
      font-style: italic;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.03em;
    }
    .lb-session {
      text-align: right;
      color: rgba(238, 238, 238, 0.4);
      font-size: 12px;
    }
    .lb-car {
      color: rgba(238, 238, 238, 0.4);
    }
    .lb-flag {
      display: inline-block;
      margin-top: 2px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: #ff9900;
      background: rgba(255, 153, 0, 0.12);
      padding: 2px 6px;
      border-radius: 4px;
    }
    .lb-flagged-time {
      text-decoration: line-through;
      opacity: 0.6;
    }

    .leaderboard-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    .leaderboard-tab {
      background: var(--surface-2);
      color: #e63946;
      border: 2px solid #333;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      display: inline-block;
      text-align: center;
    }
    .leaderboard-tab-type {
      display: block;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      opacity: 0.6;
      margin-top: 2px;
    }
    .leaderboard-tab:hover {
      background: #e63946;
      color: #fff;
      border-color: #e63946;
    }
    .leaderboard-tab.leaderboard-tab-legacy {
      background: var(--surface-1);
      border-color: #262626;
      color: #666;
    }
    .leaderboard-tab.leaderboard-tab-legacy:hover {
      background: #1a4677;
      color: #fff;
      border-color: #1a4677;
    }
    .leaderboard-tab.active {
      background: #e63946;
      color: #fff;
      border-color: #e63946;
    }
    .leaderboard-tab.leaderboard-tab-legacy.active {
      background: #1a4677;
      border-color: #1a4677;
    }
    h2.section-title {
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-top: 0;
      margin-bottom: 4px;
      padding-top: 16px;
      border-top: 1px solid #333;
    }
    .section-subtitle {
      color: #999;
      font-size: 13px;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .country-count-number {
      color: #e63946;
      font-weight: 700;
    }

    .section-box {
      background: var(--surface-1);
      border: 1px solid #2e2e2e;
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 8px;
    }
    .section-box .section-title {
      border-top: none;
      padding-top: 0;
      margin-top: 0;
    }
    .section-box .country-grid {
      margin-top: 4px;
    }

    .country-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 6px;
    }
    .country-card {
      background: var(--surface-2);
      border-radius: 6px;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .country-flag {
      width: 22px;
      height: 15px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .country-info {
      display: flex;
      flex-direction: row;
      align-items: baseline;
      gap: 5px;
      min-width: 0;
    }
    .country-code {
      font-weight: 600;
      font-size: 12.5px;
    }
    .country-count {
      color: #999;
      font-size: 11px;
    }

    @media (max-width: 600px) {
      .country-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 6px;
      }
    }

    #status {
      color: #999;
    }
    .loading-bar-track {
      display: none;
      width: 100%;
      height: 8px;
      background: var(--surface-2);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .loading-bar-track.visible {
      display: block;
    }
    .loading-bar-fill {
      height: 100%;
      width: 0%;
      background: #e63946;
      border-radius: 4px;
      transition: width 0.2s ease-out;
    }
    #status:not(:empty) {
      padding: 12px 0;
    }
    .error {
      color: #ff8080;
    }
    .empty-message {
      color: #e63946;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      font-size: 12px;
    }
    #status.loading {
      color: #e63946;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
    }
    th, td {
      padding: 9px 8px;
      border-bottom: 1px solid #333;
      text-align: left;
      font-size: 13px;
    }
    th {
      background: var(--surface-2);
      font-weight: 600;
    }
    .session-row {
      cursor: pointer;
    }
    .session-row:hover {
      background: var(--surface-3);
    }
    .lb-podium-row {
      background: #1a0a0a;
    }
    .lb-podium-row:hover {
      background: #240e0e;
    }

    footer {
      position: relative;
      margin-top: 40px;
      padding-top: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      color: #999;
      font-size: 13px;
    }
    footer::before,
    footer::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--border-subtle);
    }
    footer::before {
      top: 0;
    }
    footer::after {
      top: 6px;
    }
    .site-version {
      color: #444;
      margin-left: 8px;
    }
    #copyright-group {
      color: #555;
    }
    footer a {
      color: #e63946;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 700;
    }
    footer a svg {
      width: 16px;
      height: 16px;
      fill: #e63946;
    }
    footer a:hover svg {
      fill: #ff5a68;
    }
    footer a:hover {
      color: #ff5a68;
      text-decoration: underline;
    }

    .game-logo {
      display: block;
      height: 56px;
      width: auto;
      margin-top: 24px;
      margin-bottom: 16px;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
    }
  </style>
</head>

  <script>
    const WORKER_URL = "https://raspy-salad-d894.contact-eb9.workers.dev";

    const statusEl = document.getElementById("status");
    const contentEl = document.getElementById("content");

    // Maps ISO 3166-1 alpha-3 codes (as used in this data) to alpha-2,
    // which is what HLTV's flag images use. Covers the full standard list.
    const NATION_TO_ISO2 = {
      AFG:"AF", ALB:"AL", DZA:"DZ", ASM:"AS", AND:"AD", AGO:"AO", AIA:"AI",
      ATA:"AQ", ATG:"AG", ARG:"AR", ARM:"AM", ABW:"AW", AUS:"AU", AUT:"AT",
      AZE:"AZ", BHS:"BS", BHR:"BH", BGD:"BD", BRB:"BB", BLR:"BY", BEL:"BE",
      BLZ:"BZ", BEN:"BJ", BMU:"BM", BTN:"BT", BOL:"BO", BIH:"BA", BWA:"BW",
      BRA:"BR", BRN:"BN", BGR:"BG", BFA:"BF", BDI:"BI", KHM:"KH", CMR:"CM",

    function flagImgFor(code) {
      const iso2 = NATION_TO_ISO2[code];
      if (!iso2) return null;
      return `https://www.hltv.org/img/static/flags/30x20/${iso2}.gif`;
    }

    const COUNTRY_CACHE_KEY = "gt3_country_data_v8";
    const COUNTRY_CACHE_TTL_MS = 60 * 60 * 1000; // 1 hour

    function renderCountryData(nationCounts) {
      const nations = Object.entries(nationCounts).sort((a, b) => b[1] - a[1]);

      if (nations.length === 0) {
        statusEl.textContent = "Couldn't load driver data — check your connection and try reloading.";
        return;
      }

      statusEl.textContent = "";
      contentEl.innerHTML = "";

      const subtitleEl = document.getElementById("country-subtitle");
      if (subtitleEl) {
        subtitleEl.innerHTML = `🌍 <span class="country-count-number">${nations.length}</span> Countries Represented`;
      }

      const grid = document.createElement("div");
      grid.className = "country-grid";

      nations.forEach(([code, count]) => {
        const card = document.createElement("div");
        card.className = "country-card";
        const flagUrl = flagImgFor(code);
        const flagHtml = flagUrl
          ? `<img class="country-flag" src="${flagUrl}" alt="${code}" onerror="this.style.display='none'">`
          : `<div class="country-flag" style="display:flex;align-items:center;justify-content:center;background:#333;font-size:10px;">${code}</div>`;
        card.innerHTML = `
          ${flagHtml}
          <div class="country-info">
            <div class="country-code">${code}</div>
            <div class="country-count">${count}</div>
          </div>
        `;
        grid.appendChild(card);
      });

      contentEl.appendChild(grid);
    }

    async function fetchWithRetry(url, attempts = 2) {
      let lastError;
      for (let i = 0; i < attempts; i++) {
        try {
          const res = await fetch(url);
          if (!res.ok) throw new Error("Server returned " + res.status);
          return await res.json();
        } catch (err) {
          lastError = err;
          // Brief pause before retrying, gives a flaky mobile connection a moment to recover
          if (i < attempts - 1) await new Promise(r => setTimeout(r, 400));
        }
      }
      throw lastError;
    }

    // Nation codes to exclude entirely from the country grid.
    const EXCLUDED_NATIONS = new Set(["REU", "RUS", "ATA", "GLP", "CUW", "UMI", "MTQ", "IRN", "BES", "ATF", "GGY", "GIB", "BLM", "NCL"]);

    // Fetches and tallies driver/nation data for ONE track's session pool.
    // Kept per-track (rather than one combined fetch across every track) so
    // that adding more tracks in the future doesn't make every visitor pay
    // for fetching every track's full session history — a track's data is
    // only ever fetched when that track is actually viewed.
    async function fetchTrackDriverData(workerPrefix, onProgress) {
      const seenPlayers = new Set();
      const nationCounts = {};
      // Best-effort "First Last" -> nation lookup, used to show a flag next
      // to a driver's name on the leaderboard. The leaderboard's own data
      // source (/rows) doesn't include nation at all, so this is the only
      // way to attach one — matched purely by name, since that's the only
      // field both sources share. Not guaranteed unique or complete.
      const nameToNation = {};

      const listRes = await fetch(WORKER_URL + workerPrefix + "/api/v1/results");
      if (!listRes.ok) throw new Error("Server returned " + listRes.status);
      const listData = await listRes.json();

      const sessions = (listData.results || [])
        .slice()
        .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

      // Fetch one session at a time, sequentially, with a short gap between
      // requests. A batch of parallel requests was failing entirely on some
      // mobile networks/browsers even with retries — going fully sequential
      // removes any "burst" pattern that a carrier, router, or content
      // blocker might be flagging.
      let hadFailures = false;
      let completed = 0;
      if (onProgress) onProgress(0, sessions.length);
      for (const session of sessions) {
        let value;
        try {
          value = await fetchWithRetry(WORKER_URL + workerPrefix + session.download_url, 3);
        } catch (err) {
          hadFailures = true;
          completed++;
          if (onProgress) onProgress(completed, sessions.length);
          await new Promise(r => setTimeout(r, 30));
          continue;
        }
        await new Promise(r => setTimeout(r, 30));

        completed++;
        if (onProgress) onProgress(completed, sessions.length);

        const drivers = value.drivers || [];
        drivers.forEach(driver => {
          const key = driver.player_id || `${driver.first_name}-${driver.last_name}`;
          const nation = driver.nation;

          const fullName = `${driver.first_name || ""} ${driver.last_name || ""}`.trim();
          const nameKey = fullName.toLowerCase();
          if (nameKey && nation && !(nameKey in nameToNation)) {
            nameToNation[nameKey] = nation;
          }

          if (seenPlayers.has(key)) return;
          seenPlayers.add(key);

          if (!nation || EXCLUDED_NATIONS.has(nation)) return;
          nationCounts[nation] = (nationCounts[nation] || 0) + 1;
        });
      }

      return { nationCounts, nameToNation, hadFailures };
    }

    // Holds each track's fetched nation data once loaded, keyed by track id
    // (e.g. "nordschleife"). Used to recompute the combined country grid and
    // driver flag lookup as more tracks get loaded over time.
    const loadedTrackData = {};

    // Merged across every track loaded so far. Used to show a flag next to
    // a driver's name on the leaderboard.
    let driverNationMap = {};

    // Recomputes the combined "Drivers Around The World" grid and the
    // merged flag lookup from whatever tracks have been loaded so far, then
    // re-renders both. A driver who has raced more than one loaded track
    // will be counted once per track here (each track dedupes its own
    // drivers, but there's no cross-track identity check) — a minor
    // over-count, traded for keeping each track's fetch independent.
    function recomputeAndRenderTrackData() {
      const combinedCounts = {};
      const combinedNameToNation = {};

      Object.values(loadedTrackData).forEach(({ nationCounts, nameToNation }) => {
        Object.entries(nationCounts).forEach(([code, count]) => {
          combinedCounts[code] = (combinedCounts[code] || 0) + count;
        });
        Object.entries(nameToNation).forEach(([name, nation]) => {
          if (!(name in combinedNameToNation)) combinedNameToNation[name] = nation;
        });
      });

      renderCountryData(combinedCounts);
      driverNationMap = combinedNameToNation;
      refreshLeaderboardFlags();
    }

    // Loads a single track's driver/nation data (from cache if fresh, else
    // network), merges it in, and re-renders. Safe to call repeatedly for
    // the same track — it no-ops if that track is already loaded in memory.
    // Tracks an in-progress fetch per dataKey, so a second trigger (e.g.
    // switching tabs while the initial eager-load is still running) awaits
    // the SAME fetch instead of starting a duplicate one. Without this,
    // two "sequential" fetch loops could run concurrently for the same
    // track — exactly the kind of request burst the sequential design was
    // meant to avoid — which was causing individual session fetches to
    // fail and a degraded partial result to get cached as if complete.
    const pendingTrackDataFetch = {};

    async function ensureTrackDataLoaded(trackId) {
      // Some tracks (e.g. Spa, now that the server runs Kyalami) don't have
      // their own live driver pool anymore — they alias to whichever track
      // actually shares their underlying server, so we fetch/cache once
      // under that track's id instead of duplicating the same live data.
      const dataKey = (LEADERBOARDS[trackId] && LEADERBOARDS[trackId].driverDataSource) || trackId;

      if (loadedTrackData[dataKey]) return; // already loaded this session

      // A fetch for this exact track is already in flight — wait on it
      // rather than starting a second one.
      if (pendingTrackDataFetch[dataKey]) return pendingTrackDataFetch[dataKey];

      const config = LEADERBOARDS[dataKey];
      if (!config) return;

      const cacheKey = COUNTRY_CACHE_KEY + "_" + dataKey;

      let cached = null;
      try {
        const raw = localStorage.getItem(cacheKey);
        if (raw) cached = JSON.parse(raw);
      } catch (err) {
        // Ignore corrupt cache
      }

      if (cached && cached.nationCounts) {
        loadedTrackData[dataKey] = cached;
        recomputeAndRenderTrackData();
      } else {
        statusEl.textContent = "Loading drivers data... (This can take some time, only on 1st visit)";
        statusEl.className = "loading";
      }

      const isStale = !cached || (Date.now() - cached.timestamp > COUNTRY_CACHE_TTL_MS);
      if (!isStale) return; // cache is fresh enough, skip the network entirely

      const barTrackEl = document.getElementById("loading-bar-track");
      const barFillEl = document.getElementById("loading-bar-fill");
      // Only show progress for a genuine cold load (no usable cache yet).
      // When we already have cached data on screen, this fetch is just a
      // silent background revalidation — showing a progress bar for that
      // would make an already-loaded page look like it's re-loading from
      // scratch, which is confusing on a 2nd+ visit.
      const hadCache = Boolean(cached && cached.nationCounts);
      const showProgress = (completed, total) => {
        if (hadCache || !barTrackEl || !barFillEl || !total) return;
        barTrackEl.classList.add("visible");
        barFillEl.style.width = `${Math.min(100, (completed / total) * 100)}%`;
      };
      const hideProgress = () => {
        if (hadCache || !barTrackEl || !barFillEl) return;
        barTrackEl.classList.remove("visible");
        barFillEl.style.width = "0%";
      };

      const fetchPromise = (async () => {
        try {
          let result = await fetchTrackDriverData(config.workerPrefix, showProgress);

          // If the first pass had failures, retry once and keep whichever
          // attempt found more drivers — a failure-prone fetch (e.g. from a
          // transient network blip) is likely to succeed cleanly on a
          // second, unhurried attempt.
          if (result.hadFailures) {
            const retryResult = await fetchTrackDriverData(config.workerPrefix, showProgress);
            const countTotal = r => Object.values(r.nationCounts).reduce((a, b) => a + b, 0);
            if (countTotal(retryResult) >= countTotal(result)) {
              result = retryResult;
            }
          }

          const { nationCounts, nameToNation, hadFailures } = result;
          loadedTrackData[dataKey] = { nationCounts, nameToNation };
          recomputeAndRenderTrackData();
          // Don't persist a degraded result — if some session fetches
          // failed even after the retry, let the next visit try again
          // fresh rather than being stuck for an hour with an undercounted
          // cache.
          if (!hadFailures) {
            try {
              localStorage.setItem(cacheKey, JSON.stringify({
                nationCounts,
                nameToNation,
                timestamp: Date.now()
              }));
            } catch (err) {
              // Storage full or unavailable — not critical, just skip caching
            }
          }
        } catch (err) {
          // If we already rendered from cache, fail silently in the background.
          if (!cached) {
            statusEl.textContent = "Error loading driver data: " + err.message;
            statusEl.className = "error";
          }
        } finally {
          hideProgress();
          delete pendingTrackDataFetch[dataKey];
        }
      })();

      pendingTrackDataFetch[dataKey] = fetchPromise;
      return fetchPromise;
    }

    // ---- Race total time (Total Time column, Race-type leaderboards only) ----

    // driver "first last" (lowercase) -> { "YYYY-MM-DD" session date -> total
    // race time in ms }, per track. Sourced from each race's own results
    // file (time_standings), which is the only place the game logs a
    // penalty-adjusted official total time — the public /rows leaderboard
    // only ever has best lap. Matched by name against /rows' FullName, same
    // caveats as the flag feature. Keyed by date as well as name because
    // the same driver can appear on the Best Lap leaderboard from more than
    // one race (on different days) — a name-only key would let one race's
    // time silently clobber another's for anyone who raced more than once.
    const raceTotalTimeData = {};

    // Add a driver's exact FullName here (as it appears on the leaderboard)
    // to show "Invalid" instead of a computed Total Time for them — for
    // cases where the name-match produced a wrong/broken value (e.g. a
    // blank or 0:00.000 time) rather than their real result.
    //
    // NOT related to FLAGGED_DRIVERS / the cheater system below — this is
    // purely a data-quality fix for one bad number. The driver's row stays
    // fully visible with their correct rank, name, best lap, and session;
    // only the Total Time cell is overridden. They are not flagged, banned,
    // or removed in any way.
    const INVALID_TOTAL_TIME_DRIVERS = new Set([
      "Andres Guittard",
      "G. LACH"
    ]);

    // Strips the century off a "YYYY-MM-DD" date, e.g. "2026-07-15" ->
    // "26-07-15" — this leaderboard isn't going to outlive the century,
    // so the "20" is just visual noise.
    function formatSessionDate(dateStr) {
      if (!dateStr) return "";
      return dateStr.replace(/^\d{2}(\d{2}-\d{2}-\d{2})$/, "$1");
    }

    function formatRaceTime(ms) {
      if (ms == null || isNaN(ms)) return null;
      const totalSeconds = ms / 1000;
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds - minutes * 60;
      return `${minutes}:${seconds.toFixed(3).padStart(6, "0")}`;
    }

    async function fetchRaceTotalTimes(workerPrefix) {
      const listRes = await fetch(WORKER_URL + workerPrefix + "/api/v1/results");
      if (!listRes.ok) throw new Error("Server returned " + listRes.status);
      const listData = await listRes.json();

      const raceSessions = (listData.results || [])
        .filter(s => s.session_type === "Race")
        .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

      if (raceSessions.length === 0) return {};

      // Walk every race session (not just the latest) — the Best Lap
      // leaderboard (/rows) is an all-time ranking, so it can surface
      // drivers from older races too, and those rows need their own
      // race's Total Time rather than being left blank or matched against
      // an unrelated race. Fetched sequentially with a short gap, same
      // reasoning as the driver/country scan: a burst of parallel requests
      // was failing outright on some mobile networks.
      const nameToTotalTimesByDate = {};
      for (const session of raceSessions) {
        let detail;
        try {
          detail = await fetchWithRetry(WORKER_URL + workerPrefix + session.download_url, 3);
        } catch (err) {
          continue; // skip this one race, the rest can still succeed
        }
        await new Promise(r => setTimeout(r, 30));

        // Results timestamps are ISO strings like "2026-07-13T23:40:49-07:00" —
        // the date portion lines up with /rows' own "YYYY-MM-DD" SessionDate.
        const sessionDate = (session.timestamp || "").slice(0, 10);

        const nameByGuid = {};
        (detail.drivers || []).forEach(d => {
          if (!d.guid) return;
          const key = `${d.guid.a}-${d.guid.b}`;
          nameByGuid[key] = `${d.first_name || ""} ${d.last_name || ""}`.trim();
        });

        (detail.driver_standings || []).forEach((guid, i) => {
          if (!guid) return;
          const key = `${guid.a}-${guid.b}`;
          const name = nameByGuid[key];
          const timeMs = detail.time_standings ? detail.time_standings[i] : null;
          if (!name || timeMs == null) return;

          const nameKey = name.toLowerCase();
          if (!nameToTotalTimesByDate[nameKey]) nameToTotalTimesByDate[nameKey] = {};
          // If two races somehow share the same date for this driver, keep
          // whichever we saw first (sessions are processed newest-first).
          if (!(sessionDate in nameToTotalTimesByDate[nameKey])) {
            nameToTotalTimesByDate[nameKey][sessionDate] = timeMs;
          }
        });
      }

      return nameToTotalTimesByDate;
    }

    // Loads every race's total times for a track (no caching — always
    // fetched fresh, since a new race can happen at any time). More
    // requests than before now that every race session gets scanned rather
    // than just the latest, but still cheap relative to the driver/country
    // scan since race sessions are a small subset of all sessions.
    async function ensureRaceTotalTimesLoaded(trackId) {
      const config = LEADERBOARDS[trackId];
      if (!config || !config.isRace) return;

      try {
        raceTotalTimeData[trackId] = await fetchRaceTotalTimes(config.workerPrefix);
      } catch (err) {
        raceTotalTimeData[trackId] = {};
      }
      refreshLeaderboardFlags();
    }

    const LEADERBOARDS = {
      nordschleife: {
        workerPrefix: "/server1",
        shareKey: "ef64a8e5-f0cc-4fda-9242-33086d827694",
        displayName: "Nordschleife",
        title: "Hotlap",
        updateNote: "Ranking updated every 8 hours"
      },
      redbullring: {
        workerPrefix: "/server3",
        shareKey: "3a0072bb-b916-4262-8e81-28f6486b4f75",
        displayName: "Red Bull Ring",
        title: "Racing",
        updateNote: "Ranking updated every race",
        // Race-type leaderboards get an extra Total Time column, sourced
        // from that race's own results file (time_standings), separately
        // from the public /rows leaderboard which only has best lap.
        isRace: true
      },
      kyalami: {
        workerPrefix: "/server2",
        shareKey: "a6aea2bb-9846-446d-9987-7d64cbdd90e6",
        displayName: "Kyalami",
        title: "Hotlap",
        // Server 2 now runs Red Bull Ring, not Kyalami — same situation as
        // Spa below. Frozen leaderboard, no live status of its own anymore.
        legacy: true,
        driverDataSource: "redbullring",
        // Archived: kept fully configured (data, share key, everything) so
        // it can come back instantly by just removing this flag — but its
        // tab is hidden from the tab bar since the server's moved on.
        archived: true
      },
      spa: {
        workerPrefix: "/server2",
        shareKey: "c8393a9b-16f2-4e29-9ddb-7de2ab3ad5ae",
        displayName: "Spa Francorchamps",
        title: "Hotlap",
        updateNote: "Ranking updated every 8 hours"
      }
    };

    const leaderboardCache = {};
    const serverNameCache = {};
    let activeTrack = "nordschleife";

    // Live player counts per track, from the bot's own status embeds
    // (populated by loadDiscordStats). Only shown alongside a genuine
    // "Online" status — never next to Offline/Inactive.
    let discordPlayerCounts = {};

    function updatePlayerCountDisplay(track) {
      const countEl = document.getElementById("live-player-count");
      if (!countEl || activeTrack !== track) return;

      const liveBadgeEl = document.getElementById("server-live-badge");
      const isGenuinelyOnline = liveBadgeEl &&
        liveBadgeEl.classList.contains("visible") &&
        !liveBadgeEl.classList.contains("offline") &&
        !liveBadgeEl.classList.contains("deactivated");

      const count = discordPlayerCounts[track];
      countEl.textContent = (isGenuinelyOnline && count != null)
        ? `(${count} Driver${count === 1 ? "" : "s"})`
        : "";
    }

    // Incremented every time loadLeaderboard() is called. Lets an in-flight
    // fetch detect that a newer request has since started (even for the
    // SAME track, e.g. switching away and back before the first fetch
    // finished) and bail out instead of rendering stale/duplicate content.
    let leaderboardRequestId = 0;

    // Add a driver's exact FullName here (as it appears in the leaderboard) to flag them.
    // The note text shows under their name and their best lap gets struck through.
    // Remove the entry once they're actually removed from the leaderboard by the server admin.
    const FLAGGED_DRIVERS = {
      "Nathan VAN DE HEL": "Cheater, will be removed",
      "Jakub Qrwc": "Cheater, will be removed",
      "C C": "Cheater, will be removed",
      "Gianluca Cavinato": "Cheater, will be removed",
      "Toby Cambeul": "Cheater, will be removed",
      "Jonathan Lara": "Cheater, will be removed",
      "V3mund V": "Cheater, will be removed",
      "Cheng Lee": "Cheater, will be removed",
      "Sakélaris Van Steelant": "Cheater, will be removed",
      "Dennis Ropinski": "Cheater, will be removed",
      "Pham Vu": "Cheater, will be removed"
    };

    // For entries with no driver name (shown as "—"), flag by exact BestLap time instead,
    // since that's the only reliably unique identifier available for those rows.
    const FLAGGED_LAP_TIMES = {
      "5:49.692": "Cheater, will be removed"
    };

    // Add a driver's exact FullName here (as it appears on the leaderboard)
    // to show a verified badge next to their name. Independent of the
    // cheater-flagging system above — a driver can only be in one of the
    // two lists at a time in practice, but nothing here enforces that.
    const VERIFIED_DRIVERS = new Set([
      "WhyTore HD",
      "Christian Steenburgh",
      "Freek Frederix",
      "Marcin Pomagruk",
      "Marvin Schubert",
      "Maciej Kubiak",
      "Eric Dovjak"
    ]);
    const VERIFIED_BADGE_URL = "https://raw.githubusercontent.com/LachanceGL/gt3forc3-website/refs/heads/main/GT3FORC3_VerifiedBadge01.png";

    // Holds the currently displayed track's ranked, cheater-filtered entries,
    // so the search box can filter/re-render instantly without re-fetching.
    let currentLeaderboardEntries = [];

    function buildLeaderboardTable(entries) {
      const raceConfig = LEADERBOARDS[activeTrack];
      const isRace = Boolean(raceConfig && raceConfig.isRace);
      const totalTimesByDate = raceTotalTimeData[activeTrack] || {};

      const table = document.createElement("table");
      table.innerHTML = `
        <thead>
          <tr>
            <th class="lb-pos">🏆 #</th>
            <th>Driver</th>
            <th>Car</th>
            <th class="lb-best">Best Lap</th>
            ${isRace ? '<th class="lb-total-time">Total Time</th>' : ""}
            <th class="lb-session">Session</th>
          </tr>
        </thead>
        <tbody></tbody>
      `;
      const tbody = table.querySelector("tbody");

      const MEDALS = { 1: "🥇", 2: "🥈", 3: "🥉" };

      entries.forEach(({ rank, row }) => {
        const tr = document.createElement("tr");
        if (rank <= 3) tr.classList.add("lb-podium-row");
        const medal = `<span class="lb-medal">${MEDALS[rank] || "🏁"}</span>`;
        const nation = row.FullName ? driverNationMap[row.FullName.trim().toLowerCase()] : null;
        const flagUrl = nation ? flagImgFor(nation) : null;
        const flagHtml = flagUrl
          ? `<img class="lb-driver-flag" src="${flagUrl}" alt="${nation}" onerror="this.style.display='none'">`
          : (row.FullName ? `<span class="lb-driver-flag lb-driver-flag-unknown" title="Nationality unknown">🌍</span>` : "");
        const verifiedHtml = (row.FullName && VERIFIED_DRIVERS.has(row.FullName))
          ? `<img class="lb-verified-badge" src="${VERIFIED_BADGE_URL}" alt="Verified" title="Verified driver">`
          : "";
        const driverTimesByDate = row.FullName ? totalTimesByDate[row.FullName.trim().toLowerCase()] : null;
        const totalTimeMs = driverTimesByDate ? driverTimesByDate[row.SessionDate] : null;
        const isInvalidTotalTime = row.FullName && INVALID_TOTAL_TIME_DRIVERS.has(row.FullName);
        const totalTimeCell = isRace
          ? `<td class="lb-total-time${isInvalidTotalTime ? " lb-total-time-invalid" : ""}">${isInvalidTotalTime ? "Invalid" : (formatRaceTime(totalTimeMs) || "-")}</td>`
          : "";
        tr.innerHTML = `
          <td class="lb-pos">${medal}${rank}</td>
          <td><div class="lb-driver-name">${flagHtml}${row.FullName || "—"}${verifiedHtml}</div></td>
          <td class="lb-car">${row.CarName || "—"}</td>
          <td class="lb-best">${row.BestLap || "-"}</td>
          ${totalTimeCell}
          <td class="lb-session">${formatSessionDate(row.SessionDate)}</td>
        `;
        tbody.appendChild(tr);
      });

      if (entries.length === 0) {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td colspan="${isRace ? 6 : 5}" style="text-align:center; color:#999; padding:20px;">No results match your search.</td>`;
        tbody.appendChild(tr);
      }

      return table;
    }

    function updateLeaderboardTitle(track, entryCount) {
      const titleEl = document.getElementById("leaderboard-title");
      const config = LEADERBOARDS[track];
      if (!titleEl || !config) return;

      if (!entryCount) {
        titleEl.innerHTML = "";
        return;
      }

      const badgeText = config.updateNote || config.displayName || track;
      const label = config.title || "Hotlap";
      titleEl.innerHTML = `${label} Top ${entryCount}<span class="leaderboard-track-badge">${badgeText}</span>`;
    }

    function renderLeaderboardRows(rows) {
      const LEADERBOARD_MAX_ENTRIES = 200;
      const cleanRows = rows.filter(row => !isFlagged(row));
      currentLeaderboardEntries = cleanRows
        .map((row, i) => ({ rank: i + 1, row }))
        .slice(0, LEADERBOARD_MAX_ENTRIES);

      const searchInput = document.getElementById("leaderboard-search");
      if (searchInput) searchInput.value = "";

      return buildLeaderboardTable(currentLeaderboardEntries);
    }

    function applyLeaderboardSearch() {
      const searchInput = document.getElementById("leaderboard-search");
      const query = (searchInput.value || "").trim().toLowerCase();
      const lbFrameEl = document.getElementById("leaderboard-frame");

      if (!query) {
        lbFrameEl.innerHTML = "";
        lbFrameEl.appendChild(buildLeaderboardTable(currentLeaderboardEntries));
        return;
      }

      const filtered = currentLeaderboardEntries.filter(({ row }) => {
        const haystack = `${row.FullName || ""} ${row.CarName || ""} ${row.SessionDate || ""} ${row.SessionType || ""}`.toLowerCase();
        return haystack.includes(query);
      });

      lbFrameEl.innerHTML = "";
      lbFrameEl.appendChild(buildLeaderboardTable(filtered));
    }

    document.getElementById("leaderboard-search").addEventListener("input", applyLeaderboardSearch);

    // Called once driverNationMap has been (re)populated, so any leaderboard
    // already on screen picks up flags without needing a re-fetch. Just
    // re-runs the current search/filter state to redraw with the same rows.
    function refreshLeaderboardFlags() {
      if (currentLeaderboardEntries.length > 0) {
        applyLeaderboardSearch();
      }
    }

    async function loadLeaderboard(track) {
      activeTrack = track;
      const requestId = ++leaderboardRequestId;
      const lbStatusEl = document.getElementById("leaderboard-status");
      const lbFrameEl = document.getElementById("leaderboard-frame");
      const config = LEADERBOARDS[track];

      // Serve from cache instantly if we've already fetched this track
      if (leaderboardCache[track]) {
        lbStatusEl.textContent = "";
        lbFrameEl.innerHTML = "";
        lbFrameEl.appendChild(renderLeaderboardRows(leaderboardCache[track]));
        updateLeaderboardTitle(track, currentLeaderboardEntries.length);
        return;
      }

      lbStatusEl.textContent = "Loading leaderboard...";
      lbStatusEl.className = "";
      lbFrameEl.innerHTML = "";
      updateLeaderboardTitle(track, 0);

      try {
        const res = await fetch(WORKER_URL + `${config.workerPrefix}/leaderboards/embed/${config.shareKey}/rows`);
        if (!res.ok) throw new Error("Server returned " + res.status);
        const rows = await res.json();

        // A newer request (for this track or another) has started since —
        // discard this one rather than rendering stale/duplicate content.
        if (requestId !== leaderboardRequestId) return;

        if (!rows || rows.length === 0) {
          lbStatusEl.textContent = "🏁 No Leaderboard active yet. Go Race! 🏁";
          lbStatusEl.className = "empty-message";
          return;
        }

        leaderboardCache[track] = rows;

        lbStatusEl.textContent = "";
        lbFrameEl.innerHTML = "";
        lbFrameEl.appendChild(renderLeaderboardRows(rows));
        updateLeaderboardTitle(track, currentLeaderboardEntries.length);
      } catch (err) {
        if (requestId !== leaderboardRequestId) return;
        lbStatusEl.textContent = "Error loading leaderboard: " + err.message;
        lbStatusEl.className = "error";
      }
    }

    function isFlagged(row) {
      return Boolean(FLAGGED_DRIVERS[row.FullName] || FLAGGED_LAP_TIMES[row.BestLap]);
    }

    async function loadServerName(track) {
      const labelEl = document.getElementById("leaderboard-server-name-text");
      const liveBadgeEl = document.getElementById("server-live-badge");
      const config = LEADERBOARDS[track];

      // Legacy tracks (e.g. Spa, after the server moved to Kyalami) don't
      // have a live status of their own anymore — /server2's live status
      // now describes whatever track it currently runs, not this one.
      // These aren't just temporarily offline, they're deactivated (still
      // browsable, but there's no server behind them), so use a distinct
      // blue badge rather than the red "offline" one.
      if (config.legacy) {
        if (activeTrack === track) {
          const name = config.displayName || track;
          labelEl.innerHTML = `NO ACTIVE SERVER FOR <strong>${name.toUpperCase()}</strong> AT THE MOMENT`;
          liveBadgeEl.classList.remove("offline");
          liveBadgeEl.classList.add("visible", "deactivated");
          liveBadgeEl.innerHTML = '<span class="live-dot"></span>Inactive';
          const countEl = document.getElementById("live-player-count");
          if (countEl) countEl.textContent = "";
        }
        return;
      }

      if (serverNameCache[track]) {
        if (activeTrack === track) {
          labelEl.textContent = serverNameCache[track];
          liveBadgeEl.classList.remove("offline");
          liveBadgeEl.classList.add("visible");
          liveBadgeEl.innerHTML = '<span class="live-dot"></span>Online';
          updatePlayerCountDisplay(track);
        }
        return;
      }

      try {
        const listRes = await fetch(WORKER_URL + `${config.workerPrefix}/api/v1/results`);
        if (!listRes.ok) throw new Error("Server returned " + listRes.status);
        const listData = await listRes.json();

        const sessions = (listData.results || []).slice().sort(
          (a, b) => new Date(b.timestamp) - new Date(a.timestamp)
        );
        if (sessions.length === 0) throw new Error("No sessions found");

        const latestRes = await fetch(WORKER_URL + `${config.workerPrefix}${sessions[0].download_url}`);
        if (!latestRes.ok) throw new Error("Server returned " + latestRes.status);
        const latest = await latestRes.json();

        if (latest.server_name) {
          serverNameCache[track] = latest.server_name;
          if (activeTrack === track) {
            labelEl.textContent = latest.server_name;
            liveBadgeEl.classList.remove("offline");
            liveBadgeEl.classList.add("visible");
            liveBadgeEl.innerHTML = '<span class="live-dot"></span>Online';
            updatePlayerCountDisplay(track);
          }
        }
      } catch (err) {
        // Genuinely show an offline state rather than just hiding the badge,
        // so visitors can tell "server is down" apart from "still loading".
        if (activeTrack === track) {
          liveBadgeEl.classList.add("visible", "offline");
          liveBadgeEl.innerHTML = '<span class="live-dot"></span>Offline';
          const countEl = document.getElementById("live-player-count");
          if (countEl) countEl.textContent = "";
        }
      }
    }

    function switchToTrack(track) {
      if (!LEADERBOARDS[track]) return;
      document.querySelectorAll(".leaderboard-tab").forEach(t => {
        t.classList.toggle("active", t.dataset.track === track);
      });
      const liveBadgeEl = document.getElementById("server-live-badge");
      document.getElementById("leaderboard-server-name-text").textContent = serverNameCache[track] || "";
      document.getElementById("live-player-count").textContent = "";
      liveBadgeEl.classList.remove("visible", "offline", "deactivated");
      const cheaterNoticeEl = document.getElementById("cheater-notice");
      if (cheaterNoticeEl) cheaterNoticeEl.classList.toggle("visible", track === "nordschleife");
      loadLeaderboard(track);
      loadServerName(track);
      ensureTrackDataLoaded(track);
      ensureRaceTotalTimesLoaded(track);
    }

    // Clicking a tab just changes the URL hash (native <a> behavior);
    // this listener does the actual switching, so back/forward and
    // direct links (e.g. gt3forc3.com/#spa) all work the same way.
    window.addEventListener("hashchange", () => {
      const track = window.location.hash.replace("#", "");
      switchToTrack(track);
    });

    // On first load, respect a track named in the URL hash if present
    const initialTrack = window.location.hash.replace("#", "");
    if (LEADERBOARDS[initialTrack]) {
      activeTrack = initialTrack;
      document.querySelectorAll(".leaderboard-tab").forEach(t => {
        t.classList.toggle("active", t.dataset.track === initialTrack);
      });
    }
    {
      const cheaterNoticeEl = document.getElementById("cheater-notice");
      if (cheaterNoticeEl) cheaterNoticeEl.classList.toggle("visible", activeTrack === "nordschleife");
    }

    // Give legacy (deactivated) tracks' tabs a darker, muted look so they
    // read as "not currently active" even before you click into them.
    document.querySelectorAll(".leaderboard-tab").forEach(t => {
      const config = LEADERBOARDS[t.dataset.track];
      if (config && config.legacy) {
        t.classList.add("leaderboard-tab-legacy");
      }
    });

    document.getElementById("leaderboard-server-name-text").textContent = "";
    loadServerName(activeTrack);

    // The "Drivers Around The World" section is a global overview, not tied
    // to whichever leaderboard tab is selected — so load every live track's
    // driver data up front rather than only the active one, otherwise the
    // country count would visibly grow as someone clicks through tabs
    // instead of showing the true overall total from the start.
    const uniqueDataSources = new Set(
      Object.keys(LEADERBOARDS).map(
        trackId => LEADERBOARDS[trackId].driverDataSource || trackId
      )
    );
    // Load one track fully before starting the next — running two tracks'
    // "sequential" fetch loops concurrently is itself a burst pattern, and
    // was still causing individual session requests to fail even after the
    // same-track in-flight lock was added.
    (async () => {
      for (const trackId of uniqueDataSources) {
        await ensureTrackDataLoaded(trackId);
      }
    })();

    ensureRaceTotalTimesLoaded(activeTrack);
    loadLeaderboard(activeTrack);

    document.getElementById("copyright").textContent =
      `© ${new Date().getFullYear()} GT3FORC3.COM`;

    // ---- Discord server stats (member count + online count) ----
    async function loadDiscordStats() {
      const statsEl = document.getElementById("discord-stats");
      if (!statsEl) return;

      try {
        const res = await fetch(WORKER_URL + "/discord/stats");
        if (!res.ok) throw new Error("Server returned " + res.status);
        const data = await res.json();

        const parts = [];
        if (data.online_count != null) {
          parts.push(`<span class="discord-stat-dot"></span>${data.online_count} Online`);
        }
        if (data.member_count != null) {
          parts.push(`${data.member_count} Members`);
        }

        statsEl.innerHTML = parts.join(" &nbsp;·&nbsp; ");

        discordPlayerCounts = data.server_players || {};
        updatePlayerCountDisplay(activeTrack);
      } catch (err) {
        // Fail silently — the Discord button still works fine without stats.
        statsEl.textContent = "";
      }
    }

    loadDiscordStats();

    // Re-fetch every 90s so the member/online/player counts stay live while
    // someone has the tab open, instead of freezing at whatever they were
    // on page load. The Worker's edge cache (2 min, matching the bot's own
    // refresh rate) absorbs the actual Discord API load, so this is cheap.
    setInterval(loadDiscordStats, 90 * 1000);
  </script>
</body>
