<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Race Results</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a1a;
      color: #eee;
      padding: 20px;
      max-width: 900px;
      margin: 0 auto;
    }
    h1 { margin-bottom: 4px; }
    .subtitle { color: #999; margin-bottom: 24px; font-size: 14px; }

    .discord-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #5865F2;
      color: #fff;
      text-decoration: none;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 24px;
    }
    .discord-link:hover { background: #4752c4; }

    .leaderboard-frame {
      width: 100%;
      height: 800px;
      border: none;
      border-radius: 8px;
      background: #111;
      margin-bottom: 32px;
    }

    h2.section-title {
      font-size: 20px;
      margin-top: 0;
      margin-bottom: 4px;
      padding-top: 16px;
      border-top: 1px solid #333;
    }
    .section-subtitle {
      color: #999;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .country-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
    }
    .country-card {
      background: #2a2a2a;
      border-radius: 8px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .country-flag {
      font-size: 28px;
      line-height: 1;
    }
    .country-info {
      display: flex;
      flex-direction: column;
    }
    .country-code {
      font-weight: 600;
      font-size: 14px;
    }
    .country-count {
      color: #999;
      font-size: 12px;
    }

    #status {
      color: #999;
      padding: 20px 0;
    }
    .error {
      color: #ff8080;
    }
  </style>
</head>
<body>
  <h1>Race Results</h1>
  <div class="subtitle">GT3forc3.com</div>

  <div>
    <a class="discord-link" href="https://discord.gg/edVd7RMfpH" target="_blank" rel="noopener">
      Join our Discord
    </a>
  </div>

  <iframe
    class="leaderboard-frame"
    src="https://ca.assettohosting.com:10647/leaderboards/embed/1bb39366-c808-4171-94bb-af286353e2f6"
    loading="lazy">
  </iframe>

  <h2 class="section-title">Where Our Drivers Race From</h2>
  <div class="section-subtitle">Countries represented across recent sessions</div>
  <div id="status"></div>
  <div id="content"></div>

  <script>
    const WORKER_URL = "https://raspy-salad-d894.contact-eb9.workers.dev";
    const SESSIONS_TO_SCAN = 30; // how many recent sessions to pull driver data from

    const statusEl = document.getElementById("status");
    const contentEl = document.getElementById("content");

    // Maps IOC/nation codes (as used by this data) to flag emoji.
    // Falls back to showing the code with no flag if not found here.
    const NATION_FLAGS = {
      USA: "🇺🇸", CAN: "🇨🇦", MEX: "🇲🇽", BRA: "🇧🇷", ARG: "🇦🇷",
      GBR: "🇬🇧", IRL: "🇮🇪", FRA: "🇫🇷", DEU: "🇩🇪", ESP: "🇪🇸",
      ITA: "🇮🇹", POR: "🇵🇹", NED: "🇳🇱", BEL: "🇧🇪", SUI: "🇨🇭",
      AUT: "🇦🇹", POL: "🇵🇱", HUN: "🇭🇺", CZE: "🇨🇿", SVK: "🇸🇰",
      SVN: "🇸🇮", CRO: "🇭🇷", ROU: "🇷🇴", BUL: "🇧🇬", GRE: "🇬🇷",
      SWE: "🇸🇪", NOR: "🇳🇴", DEN: "🇩🇰", FIN: "🇫🇮", ISL: "🇮🇸",
      RUS: "🇷🇺", UKR: "🇺🇦", TUR: "🇹🇷", ISR: "🇮🇱", SRB: "🇷🇸",
      KOR: "🇰🇷", JPN: "🇯🇵", CHN: "🇨🇳", TPE: "🇹🇼", HKG: "🇭🇰",
      IND: "🇮🇳", AUS: "🇦🇺", NZL: "🇳🇿", ZAF: "🇿🇦", GHA: "🇬🇭",
      NGA: "🇳🇬", EGY: "🇪🇬", MAR: "🇲🇦", SAU: "🇸🇦", UAE: "🇦🇪",
      THA: "🇹🇭", PHI: "🇵🇭", MAS: "🇲🇾", SGP: "🇸🇬", IDN: "🇮🇩",
      VIE: "🇻🇳", COL: "🇨🇴", CHI: "🇨🇱", PER: "🇵🇪", PSE: "🇵🇸",
      LAT: "🇱🇻", LTU: "🇱🇹", EST: "🇪🇪"
    };

    function flagFor(code) {
      return NATION_FLAGS[code] || "🏁";
    }

    async function loadCountries() {
      statusEl.textContent = "Loading driver data...";
      statusEl.className = "";
      contentEl.innerHTML = "";

      try {
        const listRes = await fetch(WORKER_URL + "/api/v1/results");
        if (!listRes.ok) throw new Error("Server returned " + listRes.status);
        const listData = await listRes.json();

        const sessions = (listData.results || [])
          .slice()
          .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))
          .slice(0, SESSIONS_TO_SCAN);

        if (sessions.length === 0) {
          statusEl.textContent = "No session data found.";
          return;
        }

        const detailResults = await Promise.allSettled(
          sessions.map(s => fetch(WORKER_URL + s.download_url).then(r => r.json()))
        );

        // Dedupe drivers by player_id, tally by nation
        const seenPlayers = new Set();
        const nationCounts = {};

        detailResults.forEach(result => {
          if (result.status !== "fulfilled") return;
          const drivers = result.value.drivers || [];
          drivers.forEach(driver => {
            const key = driver.player_id || `${driver.first_name}-${driver.last_name}`;
            if (seenPlayers.has(key)) return;
            seenPlayers.add(key);

            const nation = driver.nation || "Unknown";
            nationCounts[nation] = (nationCounts[nation] || 0) + 1;
          });
        });

        const nations = Object.entries(nationCounts).sort((a, b) => b[1] - a[1]);

        if (nations.length === 0) {
          statusEl.textContent = "No driver nation data found.";
          return;
        }

        statusEl.textContent = "";

        const grid = document.createElement("div");
        grid.className = "country-grid";

        nations.forEach(([code, count]) => {
          const card = document.createElement("div");
          card.className = "country-card";
          card.innerHTML = `
            <div class="country-flag">${flagFor(code)}</div>
            <div class="country-info">
              <div class="country-code">${code}</div>
              <div class="country-count">${count} driver${count === 1 ? "" : "s"}</div>
            </div>
          `;
          grid.appendChild(card);
        });

        contentEl.appendChild(grid);
      } catch (err) {
        statusEl.textContent = "Error loading driver data: " + err.message;
        statusEl.className = "error";
      }
    }

    loadCountries();
  </script>
</body>
</html>
