<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Race Results</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a1a;
      color: #eee;
      padding: 20px;
      max-width: 900px;
      margin: 0 auto;
    }
    h1 { margin-bottom: 4px; }
    .subtitle { color: #999; margin-bottom: 24px; font-size: 14px; }

    .discord-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #5865F2;
      color: #fff;
      text-decoration: none;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 24px;
    }
    .discord-link:hover { background: #4752c4; }

    .leaderboard-frame {
      width: 100%;
      height: 800px;
      border: none;
      border-radius: 8px;
      background: #111;
      margin-bottom: 32px;
    }

    h2.section-title {
      font-size: 20px;
      margin-top: 0;
      margin-bottom: 12px;
      padding-top: 16px;
      border-top: 1px solid #333;
    }

    #back-btn {
      display: none;
      background: #2a2a2a;
      color: #eee;
      border: 1px solid #444;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 16px;
      font-size: 14px;
    }
    #back-btn:hover { background: #333; }

    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid #333;
      text-align: left;
      font-size: 14px;
    }
    th {
      background: #2a2a2a;
      font-weight: 600;
    }

    .session-row {
      cursor: pointer;
    }
    .session-row:hover {
      background: #242424;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-race { background: #4a2a2a; color: #ff8080; }
    .badge-qualify { background: #2a3a4a; color: #80c0ff; }

    #status {
      color: #999;
      padding: 20px 0;
    }
    .error {
      color: #ff8080;
    }
  </style>
</head>
<body>
  <h1>Race Results</h1>
  <div class="subtitle">GT3forc3.com</div>

  <div>
    <a class="discord-link" href="https://discord.gg/edVd7RMfpH" target="_blank" rel="noopener">
      Join our Discord
    </a>
  </div>

  <iframe
    class="leaderboard-frame"
    src="https://ca.assettohosting.com:10647/leaderboards/embed/1bb39366-c808-4171-94bb-af286353e2f6"
    loading="lazy">
  </iframe>

  <h2 class="section-title">Session History</h2>
  <button id="back-btn">&larr; Back to sessions</button>
  <div id="status"></div>
  <div id="content"></div>

  <script>
    const WORKER_URL = "https://raspy-salad-d894.contact-eb9.workers.dev";

    const statusEl = document.getElementById("status");
    const contentEl = document.getElementById("content");
    const backBtn = document.getElementById("back-btn");

    backBtn.addEventListener("click", loadSessionList);

    function formatTimestamp(ts) {
      const date = new Date(ts);
      return date.toLocaleString(undefined, {
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit"
      });
    }

    async function loadSessionList() {
      backBtn.style.display = "none";
      statusEl.textContent = "Loading sessions...";
      statusEl.className = "";
      contentEl.innerHTML = "";

      try {
        const res = await fetch(WORKER_URL + "/api/v1/results");
        if (!res.ok) throw new Error("Server returned " + res.status);
        const data = await res.json();

        const sessions = (data.results || []).slice().sort(
          (a, b) => new Date(b.timestamp) - new Date(a.timestamp)
        );

        if (sessions.length === 0) {
          statusEl.textContent = "No sessions found.";
          return;
        }

        statusEl.textContent = "";

        const table = document.createElement("table");
        table.innerHTML = `
          <thead>
            <tr>
              <th>Date</th>
              <th>Type</th>
            </tr>
          </thead>
          <tbody></tbody>
        `;
        const tbody = table.querySelector("tbody");

        sessions.forEach(session => {
          const tr = document.createElement("tr");
          tr.className = "session-row";
          const badgeClass = session.session_type === "Race" ? "badge-race" : "badge-qualify";
          tr.innerHTML = `
            <td>${formatTimestamp(session.timestamp)}</td>
            <td><span class="badge ${badgeClass}">${session.session_type}</span></td>
          `;
          tr.addEventListener("click", () => loadSessionDetail(session));
          tbody.appendChild(tr);
        });

        contentEl.appendChild(table);
      } catch (err) {
        statusEl.textContent = "Error loading sessions: " + err.message;
        statusEl.className = "error";
      }
    }

    async function loadSessionDetail(session) {
      backBtn.style.display = "inline-block";
      statusEl.textContent = "Loading results...";
      statusEl.className = "";
      contentEl.innerHTML = "";

      try {
        const res = await fetch(WORKER_URL + session.download_url.replace(/^\/api\/v1/, "/api/v1"));
        if (!res.ok) throw new Error("Server returned " + res.status);
        const data = await res.json();

        statusEl.textContent = "";
        renderSessionDetail(session, data);
      } catch (err) {
        statusEl.textContent = "Error loading session detail: " + err.message;
        statusEl.className = "error";
      }
    }

    function guidsMatch(g1, g2) {
      if (!g1 || !g2) return false;
      return g1.a === g2.a && g1.b === g2.b;
    }

    function formatLapTime(ms) {
      if (ms === null || ms === undefined || ms <= 0 || ms === Infinity) return "-";
      const totalSeconds = ms / 1000;
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = (totalSeconds % 60).toFixed(3).padStart(6, "0");
      return `${minutes}:${seconds}`;
    }

    function renderSessionDetail(session, data) {
      const heading = document.createElement("h2");
      heading.textContent = `${session.session_type} — ${formatTimestamp(session.timestamp)}`;
      contentEl.appendChild(heading);

      const meta = document.createElement("div");
      meta.style.color = "#999";
      meta.style.fontSize = "13px";
      meta.style.marginBottom = "16px";
      meta.textContent = `${data.track_name || ""} ${data.track_layout_name ? "– " + data.track_layout_name : ""}`;
      contentEl.appendChild(meta);

      const driverStandings = data.driver_standings || [];

      if (driverStandings.length === 0) {
        const p = document.createElement("p");
        p.style.color = "#999";
        p.textContent = "No results recorded for this session (no drivers set laps).";
        contentEl.appendChild(p);
        return;
      }

      const table = document.createElement("table");
      table.innerHTML = `
        <thead>
          <tr>
            <th>#</th>
            <th>Driver</th>
            <th>Car</th>
            <th>Nation</th>
            <th>Best Lap</th>
          </tr>
        </thead>
        <tbody></tbody>
      `;
      const tbody = table.querySelector("tbody");

      driverStandings.forEach((driverGuid, i) => {
        const driver = (data.drivers || []).find(d => guidsMatch(d.guid, driverGuid));
        const carStanding = (data.car_standings || [])[i];
        const car = carStanding
          ? (data.cars || []).find(c => guidsMatch(c.car_id, carStanding.car_id || carStanding))
          : null;

        // Find this driver's best lap from the laps array, if present
        const driverLaps = (data.laps || []).filter(lap =>
          guidsMatch(lap.driver_guid || lap.driver, driverGuid)
        );
        const bestLapMs = driverLaps.length
          ? Math.min(...driverLaps.map(l => l.lap_time_ms || l.laptime_ms || l.time_ms || Infinity))
          : null;

        const driverName = driver
          ? `${driver.first_name || ""} ${driver.last_name || ""}`.trim()
          : "-";
        const carName = car ? (car.model_displayname || "-") : "-";
        const nation = driver ? (driver.nation || "-") : "-";

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${i + 1}</td>
          <td>${driverName || "-"}</td>
          <td>${carName}</td>
          <td>${nation}</td>
          <td>${formatLapTime(bestLapMs)}</td>
        `;
        tbody.appendChild(tr);
      });

      contentEl.appendChild(table);

      // Note if lap timing data wasn't present at all
      if (!data.laps || data.laps.length === 0) {
        const note = document.createElement("p");
        note.style.color = "#999";
        note.style.fontSize = "13px";
        note.style.marginTop = "12px";
        note.textContent = "Lap time data wasn't available in this session's results.";
        contentEl.appendChild(note);
      }
    }

    loadSessionList();
  </script>
</body>
</html>
